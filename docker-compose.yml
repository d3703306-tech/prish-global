version: '3.8'

services:
  web:
    build: 
      context: ./04_frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Resume upload handler (future: S3 integration)
  upload:
    image: node:20-alpine
    working_dir: /app
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

networks:
  default:
    name: prish-network
